name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig: ["0.15.2", "0.16.0", "master"]
    continue-on-error: ${{ matrix.zig == 'master' }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}

      - name: Check formatting
        run: zig fmt --check src/ build.zig

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

      - name: Build fuzz targets
        run: zig build fuzz

  docs:
    name: Deploy docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build docs
        run: zig build docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/docs

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
